<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="star1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.35"/>

  <!-- Inner filled circle -->
  <circle cx="256" cy="256" r="170" fill="url(#inner)"/>

  <!-- Ring border -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.7"/>

  <!-- 8-point star / seal -->
  <g transform="translate(256,256)" filter="url(#starglow)">
    <!-- 8 rotated squares making a star seal -->
    <g opacity="0.9">
      <rect x="-68" y="-68" width="136" height="136" rx="12" fill="#4338ca" transform="rotate(0)"/>
      <rect x="-68" y="-68" width="136" height="136" rx="12" fill="#5b21b6" transform="rotate(22.5)" opacity="0.7"/>
      <rect x="-68" y="-68" width="136" height="136" rx="12" fill="#4c1d95" transform="rotate(45)" opacity="0.8"/>
    </g>

    <!-- Center diamond (TON-style) -->
    <g filter="url(#glow)">
      <polygon points="0,-55  42,-18  42,18  0,55  -42,18  -42,-18" fill="#60a5fa"/>
      <polygon points="0,-55  18,-25  0,-12 -18,-25" fill="#bfdbfe"/>
      <polygon points="-42,-18 -18,-25  0,-12  0,12  -42,18" fill="#3730a3"/>
      <polygon points=" 42,-18  18,-25  0,-12  0,12   42,18" fill="#1d4ed8"/>
      <polygon points="0,55  -42,18  0,12  42,18" fill="#1e3a8a"/>
      <!-- Highlight -->
      <polygon points="0,-55  12,-38  0,-25  -12,-38" fill="white" opacity="0.4"/>
    </g>
  </g>

  <!-- Gold star top -->
  <g transform="translate(256,66)" filter="url(#starglow)">
    <polygon points="0,-22 6,-8 22,-8 10,2 14,18 0,8 -14,18 -10,2 -22,-8 -6,-8"
             fill="url(#star1)"/>
  </g>

  <!-- Subtle outer stars -->
  <g transform="translate(140,140)">
    <polygon points="0,-10 2.5,-3 10,-3 4,2 6,10 0,5 -6,10 -4,2 -10,-3 -2.5,-3"
             fill="#a78bfa" opacity="0.45"/>
  </g>
  <g transform="translate(372,140)">
    <polygon points="0,-10 2.5,-3 10,-3 4,2 6,10 0,5 -6,10 -4,2 -10,-3 -2.5,-3"
             fill="#a78bfa" opacity="0.45"/>
  </g>
  <g transform="translate(140,372)">
    <polygon points="0,-8 2,-2.5 8,-2.5 3.5,1.5 5,8 0,4 -5,8 -3.5,1.5 -8,-2.5 -2,-2.5"
             fill="#a78bfa" opacity="0.3"/>
  </g>
  <g transform="translate(372,372)">
    <polygon points="0,-8 2,-2.5 8,-2.5 3.5,1.5 5,8 0,4 -5,8 -3.5,1.5 -8,-2.5 -2,-2.5"
             fill="#a78bfa" opacity="0.3"/>
  </g>
</svg>
