<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b2a"/>
      <stop offset="100%" stop-color="#1a1545"/>
    </linearGradient>
    <linearGradient id="icongrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="megagrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle lines -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

  <!-- Megaphone icon — centered upper area -->
  <g transform="translate(256,182)" filter="url(#glow)">
    <!-- Main horn body -->
    <path d="M-20,-60 L80,10 L80,50 L-20,50 Z" fill="url(#megagrad)" rx="4"/>
    <!-- Horn flare -->
    <path d="M80,10 L130,-18 L130,78 L80,50 Z" fill="url(#icongrad)"/>
    <!-- Handle base -->
    <rect x="-65" y="-10" width="50" height="70" rx="25" fill="url(#megagrad)"/>
    <!-- Speaker rings -->
    <path d="M100,-28 Q118,-10 118,30 Q118,68 100,78" fill="none" stroke="#ddd6fe" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M115,-40 Q140,-14 140,30 Q140,72 115,58" fill="none" stroke="#c4b5fd" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
    <!-- Gold dot (live indicator) -->
    <circle cx="-40" cy="-28" r="10" fill="url(#badge)"/>
    <circle cx="-40" cy="-28" r="5" fill="white" opacity="0.6"/>
  </g>

  <!-- TonCipher -->
  <text x="256" y="342"
        font-family="'Arial Black','Impact','Helvetica Neue',sans-serif"
        font-weight="900" font-size="62" fill="url(#textgrad)"
        text-anchor="middle" letter-spacing="-1">TonCipher</text>

  <!-- Divider -->
  <rect x="160" y="357" width="192" height="2" rx="1" fill="#7c3aed" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="256" y="398"
        font-family="'Arial','Helvetica Neue',sans-serif"
        font-weight="700" font-size="26" fill="#a78bfa"
        text-anchor="middle" letter-spacing="7">OFFICIEL</text>
</svg>
