<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16"/>
      <stop offset="50%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#10b981" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg3)" rx="80"/>

  <!-- Decorative rings -->
  <circle cx="256" cy="230" r="185" fill="none" stroke="#10b981" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="230" r="165" fill="none" stroke="#34d399" stroke-width="0.6" opacity="0.12"/>

  <!-- Main circle with checkmark -->
  <g filter="url(#shadow3)" transform="translate(256,220)">
    <!-- Circle background -->
    <circle cx="0" cy="0" r="138" fill="url(#circle)" opacity="0.15"/>
    <circle cx="0" cy="0" r="125" fill="none" stroke="url(#circle)" stroke-width="6" opacity="0.8"/>

    <!-- Big checkmark -->
    <g filter="url(#glow3)">
      <polyline points="-68,8 -22,58 72,-52"
                fill="none" stroke="#10b981" stroke-width="22"
                stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="-68,8 -22,58 72,-52"
                fill="none" stroke="#34d399" stroke-width="10"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Small coin icons -->
  <g transform="translate(115,120)">
    <circle cx="0" cy="0" r="28" fill="url(#coin)" opacity="0.85"/>
    <text x="0" y="10" font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="22" fill="#7c2d12" text-anchor="middle">T</text>
  </g>
  <g transform="translate(397,118)">
    <circle cx="0" cy="0" r="22" fill="url(#coin)" opacity="0.65"/>
    <text x="0" y="8" font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="18" fill="#7c2d12" text-anchor="middle">T</text>
  </g>
  <g transform="translate(106,340)">
    <circle cx="0" cy="0" r="18" fill="url(#coin)" opacity="0.5"/>
    <text x="0" y="7" font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="14" fill="#7c2d12" text-anchor="middle">T</text>
  </g>
  <g transform="translate(405,342)">
    <circle cx="0" cy="0" r="24" fill="url(#coin)" opacity="0.7"/>
    <text x="0" y="9" font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="18" fill="#7c2d12" text-anchor="middle">T</text>
  </g>

  <!-- Text -->
  <text x="256" y="415" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900"
        font-size="52" fill="white" text-anchor="middle" letter-spacing="4" opacity="0.95">
    TonCipher
  </text>
  <text x="256" y="457" font-family="'Arial', sans-serif" font-weight="700"
        font-size="27" fill="#34d399" text-anchor="middle" letter-spacing="8" opacity="0.9">
    PAIEMENTS
  </text>
</svg>
