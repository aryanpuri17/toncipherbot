<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b2a"/>
      <stop offset="100%" stop-color="#1a1545"/>
    </linearGradient>
    <linearGradient id="gemtop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="gemleft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="gemright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="195" rx="130" ry="110" fill="#6366f1" opacity="0.10" filter="url(#glow)"/>

  <!-- Diamond gem -->
  <g transform="translate(256,188)" filter="url(#glow)">
    <polygon points="0,-108 -78,-30  0, -8  78,-30" fill="url(#gemtop)"/>
    <polygon points="-78,-30 -102, 54  0,108  0,-8"  fill="url(#gemleft)"/>
    <polygon points=" 78,-30  102, 54  0,108  0,-8"  fill="url(#gemright)"/>
    <polygon points="0,-108 32,-64 0,-8 -32,-64"     fill="#93c5fd" opacity="0.6"/>
    <polygon points="0,-108 15,-85 0,-68 -15,-85"    fill="white"   opacity="0.4"/>
    <line x1="0" y1="-8" x2="0" y2="108" stroke="#93c5fd" stroke-width="0.8" opacity="0.18"/>
  </g>

  <!-- Name -->
  <text x="256" y="348" font-family="'Arial Black','Helvetica Neue',sans-serif"
        font-weight="900" font-size="64" fill="white" text-anchor="middle" letter-spacing="-1">TonCipher</text>

  <!-- Accent line -->
  <rect x="178" y="362" width="156" height="2.5" rx="1.5" fill="url(#accent)" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="256" y="402" font-family="'Arial','Helvetica Neue',sans-serif"
        font-weight="700" font-size="24" fill="#818cf8" text-anchor="middle" letter-spacing="7">EARN  TON</text>
</svg>
