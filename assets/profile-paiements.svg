<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020d07"/>
      <stop offset="100%" stop-color="#071a10"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#022c16"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ambient green glow -->
  <circle cx="256" cy="256" r="130" fill="#10b981" opacity="0.06" filter="url(#ambient)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.25"/>

  <!-- Inner circle -->
  <circle cx="256" cy="256" r="170" fill="url(#inner)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.65"/>

  <!-- Secondary ring inside -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2"/>

  <!-- Checkmark — bold, centered -->
  <g filter="url(#glow)">
    <!-- Shadow layer -->
    <polyline points="152,256  220,322  360,178"
              fill="none" stroke="#059669" stroke-width="36"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    <!-- Main check -->
    <polyline points="152,256  220,322  360,178"
              fill="none" stroke="url(#check)" stroke-width="28"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bright inner check -->
    <polyline points="152,256  220,322  360,178"
              fill="none" stroke="#d1fae5" stroke-width="8"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  </g>

  <!-- Corner sparkles -->
  <circle cx="256" cy="72"  r="3" fill="#34d399" opacity="0.6"/>
  <circle cx="440" cy="256" r="3" fill="#34d399" opacity="0.4"/>
  <circle cx="256" cy="440" r="3" fill="#34d399" opacity="0.6"/>
  <circle cx="72"  cy="256" r="3" fill="#34d399" opacity="0.4"/>
</svg>
