name: Keep Render Alive

on:
  schedule:
    # Ping every 5 minutes — prevents Render free plan from sleeping
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # manual trigger if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://toncipherbot.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS"
          fi
