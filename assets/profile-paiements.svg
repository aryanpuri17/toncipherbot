<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="orb1" cx="25%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#4f6ff5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4f6ff5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="78%" cy="68%" r="50%">
      <stop offset="0%" stop-color="#10b060" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10b060" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hexstroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="diamondtop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5c8ff"/>
      <stop offset="100%" stop-color="#5b9ef8"/>
    </linearGradient>
    <linearGradient id="diamondleft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a55cc"/>
      <stop offset="100%" stop-color="#1a3a99"/>
    </linearGradient>
    <linearGradient id="diamondright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e46b8"/>
      <stop offset="100%" stop-color="#0f2870"/>
    </linearGradient>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#10b060" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#0a0b1e"/>
  <ellipse cx="130" cy="160" rx="235" ry="225" fill="url(#orb1)"/>
  <ellipse cx="385" cy="360" rx="205" ry="200" fill="url(#orb2)"/>

  <!-- Hexagon — green border -->
  <g transform="translate(256,205)" filter="url(#softshadow)">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"
             fill="#111535" stroke="url(#hexstroke)" stroke-width="3"/>
    <g transform="translate(0,2)">
      <polygon points="0,-46 -30,-8 0,46 30,-8" fill="url(#diamondtop)" opacity="0.9"/>
      <polygon points="0,-46 -30,-8 0,-8"        fill="#c8deff" opacity="0.85"/>
      <polygon points="0,-46  30,-8 0,-8"        fill="url(#diamondtop)" opacity="0.7"/>
      <polygon points="-30,-8  0,46 0,-8"        fill="url(#diamondleft)"/>
      <polygon points=" 30,-8  0,46 0,-8"        fill="url(#diamondright)"/>
      <polygon points="0,-46 10,-28 0,-18 -10,-28" fill="white" opacity="0.35"/>
    </g>
  </g>

  <!-- TonCipher -->
  <text x="256" y="345"
        font-family="'Trebuchet MS','Segoe UI','Arial',sans-serif"
        font-weight="700" font-size="66" fill="white"
        text-anchor="middle">TonCipher</text>

  <!-- Green line -->
  <rect x="148" y="358" width="216" height="2" rx="1" fill="#34d399" opacity="0.65"/>

  <!-- Retraits subtitle -->
  <text x="256" y="398"
        font-family="'Segoe UI','Arial',sans-serif"
        font-weight="600" font-size="26" fill="#34d399"
        text-anchor="middle" letter-spacing="8">RETRAITS</text>

  <!-- Channel link -->
  <text x="256" y="440"
        font-family="'Segoe UI','Arial',sans-serif"
        font-weight="400" font-size="17" fill="#1e7a52"
        text-anchor="middle">💎  t.me/TonCipher_Pays</text>
</svg>
