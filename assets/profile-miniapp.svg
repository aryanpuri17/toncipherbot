<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#111132"/>
    </linearGradient>
    <linearGradient id="gem1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gem2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="face1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="face2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="face3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ambient glow behind gem -->
  <ellipse cx="256" cy="256" rx="160" ry="140" fill="#3b82f6" opacity="0.08" filter="url(#softglow)"/>

  <!-- Diamond gem — centered, large -->
  <g transform="translate(256,248)" filter="url(#glow)">
    <!-- Top left face -->
    <polygon points="0,-148  -72,-44  0,-22" fill="url(#face1)"/>
    <!-- Top right face -->
    <polygon points="0,-148   72,-44  0,-22" fill="url(#gem1)" opacity="0.85"/>
    <!-- Left face -->
    <polygon points="-72,-44 -96,52  0,148  0,-22" fill="url(#face2)"/>
    <!-- Right face -->
    <polygon points=" 72,-44  96,52  0,148  0,-22" fill="url(#face3)"/>
    <!-- Bottom left -->
    <polygon points="-96,52   0,148  0,52  -72,-44  0,-22  0,52" fill="#2d3a8c" opacity="0.5"/>
    <!-- Bottom right -->
    <polygon points=" 96,52   0,148  0,52   72,-44  0,-22  0,52" fill="#1e3a8a" opacity="0.4"/>
    <!-- Center crease -->
    <line x1="0" y1="-22" x2="0" y2="148" stroke="#93c5fd" stroke-width="0.8" opacity="0.25"/>
    <!-- Top highlight streak -->
    <polygon points="0,-148 30,-90 0,-22 -30,-90" fill="white" opacity="0.12"/>
    <!-- Top shimmer -->
    <polygon points="0,-148 18,-118 0,-100 -18,-118" fill="white" opacity="0.35"/>
  </g>

  <!-- Subtle corner dots -->
  <circle cx="80"  cy="80"  r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="432" cy="80"  r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="80"  cy="432" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="432" cy="432" r="2" fill="#6366f1" opacity="0.4"/>
</svg>
