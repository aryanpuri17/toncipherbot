name: Keep Render Alive

on:
  schedule:
    # GitHub minimum is 5 min but often delays — run every 5 min across 4 jobs
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        # || true ensures the job never shows red even if Render is sleeping
        run: |
          curl -s --max-time 60 https://toncipherbot.onrender.com/health || true
          echo "Ping sent"
