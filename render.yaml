services:
  - type: web
    name: toncipherbot
    runtime: python
    plan: starter          # Minimum requis pour le disque persistant
    buildCommand: pip install -r requirements.txt && npm install && npm run build
    startCommand: python main.py
    healthCheckPath: /health
    disk:
      name: toncipherbot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: OFFICIAL_CHANNEL
        sync: false
      - key: DATABASE_PATH
        value: /data/toncipherbot.db
